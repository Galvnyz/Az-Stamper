<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Az-Stamper Config</title>
  <link rel="icon" type="image/png" href="/img/az-stamper-icon.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-logo"><img src="/img/az-stamper-icon.png" alt="Az-Stamper" style="height:40px;width:40px;vertical-align:middle;margin-right:8px;border-radius:6px;">Az-Stamper</div>
    <nav class="tabs" id="tabs">
      <div class="tab active" data-tab="subscriptions">Configuration</div>
      <div class="tab" data-tab="rules">Tag Rules</div>
      <div class="tab" data-tab="simulate">Simulate</div>
      <div class="tab" data-tab="activity">Activity</div>
    </nav>
    <div class="header-user" id="user-info">
      <button class="btn btn-primary" id="sign-in-btn" data-action="sign-in">Sign In</button>
    </div>
  </header>

  <main class="content">
    <div id="sign-in-prompt" class="sign-in-prompt">
      <img src="/img/az-stamper-icon.png" alt="Az-Stamper" style="height:128px;width:128px;border-radius:16px;margin-bottom:16px;">
      <h2>Welcome to Az-Stamper Config</h2>
      <p style="color: var(--text-secondary);">Sign in with your Azure account to manage tag configuration.</p>
      <button class="btn btn-primary btn-lg" data-action="sign-in">Sign In with Microsoft</button>
    </div>

    <div id="app-content" style="display:none;">
      <div class="tab-panel active" id="panel-subscriptions"></div>
      <div class="tab-panel" id="panel-rules"></div>
      <div class="tab-panel" id="panel-simulate"></div>
      <div class="tab-panel" id="panel-activity"></div>
    </div>
  </main>

  <div id="modal-container"></div>
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app-config.js"></script>
  <script src="/lib/msal-browser.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/enrollment.js"></script>
  <script src="/js/tabs/subscriptions.js"></script>
  <script src="/js/tabs/rules.js"></script>
  <script src="/js/tabs/simulate.js"></script>
  <script src="/js/tabs/activity.js"></script>
  <script src="/js/app-init.js"></script>
</body>
</html>
