<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Az-Stamper Config</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-logo">&#9889; Az-Stamper</div>
    <nav class="tabs" id="tabs">
      <div class="tab active" data-tab="subscriptions">Subscriptions</div>
      <div class="tab" data-tab="rules">Tag Rules</div>
      <div class="tab" data-tab="simulate">Simulate</div>
      <div class="tab" data-tab="activity">Activity</div>
    </nav>
    <div class="header-user" id="user-info">
      <button class="btn btn-primary" id="sign-in-btn" onclick="signIn()">Sign In</button>
    </div>
  </header>

  <main class="content">
    <div id="sign-in-prompt" class="sign-in-prompt">
      <h2>Welcome to Az-Stamper Config</h2>
      <p style="color: var(--text-secondary);">Sign in with your Azure account to manage tag configuration.</p>
      <button class="btn btn-primary btn-lg" onclick="signIn()">Sign In with Microsoft</button>
    </div>

    <div id="app-content" style="display:none;">
      <div class="tab-panel active" id="panel-subscriptions"></div>
      <div class="tab-panel" id="panel-rules"></div>
      <div class="tab-panel" id="panel-simulate"></div>
      <div class="tab-panel" id="panel-activity"></div>
    </div>
  </main>

  <div id="modal-container"></div>
  <div class="toast-container" id="toast-container"></div>

  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/tabs/subscriptions.js"></script>
  <script src="/js/tabs/rules.js"></script>
  <script src="/js/tabs/simulate.js"></script>
  <script src="/js/tabs/activity.js"></script>

  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
        const loadFn = window['load' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1) + 'Tab'];
        if (loadFn) loadFn();
      });
    });
  </script>
</body>
</html>
