name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish src/AzStamper.Functions/AzStamper.Functions.csproj -c Release -o ./publish

      - name: Package
        run: cd publish && zip -r ../deploy.zip .

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ vars.RESOURCE_GROUP }} \
            --location ${{ vars.LOCATION }} \
            --tags Project=Az-Stamper ManagedBy=Bicep Environment=${{ inputs.environment }}

      - name: Deploy infrastructure
        id: infra
        run: |
          outputs=$(az deployment group create \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/${{ inputs.environment }}.bicepparam \
            --query 'properties.outputs' -o json)
          echo "principalId=$(echo $outputs | jq -r '.principalId.value')" >> "$GITHUB_OUTPUT"
          echo "functionAppId=$(echo $outputs | jq -r '.functionAppId.value')" >> "$GITHUB_OUTPUT"
          echo "functionAppName=$(echo $outputs | jq -r '.functionAppName.value')" >> "$GITHUB_OUTPUT"
          echo "swaHostname=$(echo $outputs | jq -r '.swaHostname.value')" >> "$GITHUB_OUTPUT"
          echo "appInsightsId=$(echo $outputs | jq -r '.appInsightsId.value')" >> "$GITHUB_OUTPUT"
          echo "storageAccountName=$(echo $outputs | jq -r '.storageAccountName.value')" >> "$GITHUB_OUTPUT"
          echo "swaName=$(echo $outputs | jq -r '.swaName.value')" >> "$GITHUB_OUTPUT"

      - name: Set SelfPrincipalId app setting
        run: |
          az functionapp config appsettings set \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.FUNCTION_APP_NAME }} \
            --settings "StamperConfig__SelfPrincipalId=${{ steps.infra.outputs.principalId }}"

      - name: Deploy Event Grid and subscription RBAC
        run: |
          az deployment sub create \
            --location ${{ vars.LOCATION }} \
            --template-file infra/main.sub.bicep \
            --parameters \
              functionAppId='${{ steps.infra.outputs.functionAppId }}' \
              functionAppPrincipalId='${{ steps.infra.outputs.principalId }}' \
              resourceGroupName='${{ vars.RESOURCE_GROUP }}'

      - name: Deploy function code
        run: |
          az functionapp deployment source config-zip \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.FUNCTION_APP_NAME }} \
            --src deploy.zip

      - name: Generate SWA app-config.js
        run: |
          cat > swa/js/app-config.js << 'JSEOF'
          // Auto-generated by deploy workflow — do not edit manually
          window.AZ_STAMPER_CONFIG = {
            clientId: '${{ vars.SWA_CLIENT_ID }}',
            tenantId: '${{ secrets.AZURE_TENANT_ID }}',
            configBlobUrl: 'https://${{ steps.infra.outputs.storageAccountName }}.blob.core.windows.net/config/stamper.json',
            appInsightsId: '${{ steps.infra.outputs.appInsightsId }}',
            functionAppId: '${{ steps.infra.outputs.functionAppId }}'
          };
          JSEOF
